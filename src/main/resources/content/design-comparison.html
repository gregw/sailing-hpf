<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PF — Design Comparison</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
<!-- INCLUDE _nav.html -->

  <div id="import-banner" class="import-warning-banner" style="display:none">
      Data import/analysis in progress — results may be incomplete or stale
  </div>

  <h1>Design Comparison</h1>

  <div class="comparison-controls">
    <div class="selector-panels">
      <div class="selector-panel">
        <h3>Designs</h3>
        <input type="text" id="design-search" class="selector-search" placeholder="Search by design name…"
               title="Search designs by canonical name or id">
        <div id="design-list" class="selector-list"></div>
        <button id="add-design-btn" disabled>Add Design</button>
      </div>
    </div>
    <div class="comparison-options-row">
      <label class="all-available-label">
        <input type="checkbox" id="all-available"
               title="When unchecked, the selector only shows designs that have raced with every design in the comparison list">
        All available
        <span style="color:#666;font-size:0.85rem;">(uncheck to show only designs that have co-raced with all selected)</span>
      </label>
      <label class="variant-label">
        Variant:
        <select id="variant-selector" title="Which handicap variant to display">
          <option value="spin">Spin</option>
          <option value="nonSpin">Non-Spin</option>
        </select>
      </label>
      <label title="Show RF (Reference Factor) horizontal line per design">
        <input type="checkbox" id="show-rf-line" checked> RF line
      </label>
      <label title="Show weighted linear trend line per design">
        <input type="checkbox" id="show-trend-linear" checked> Linear trend
      </label>
      <label title="Show trailing N-finish weighted average per design">
        <input type="checkbox" id="show-trend-sliding" checked> Sliding average
      </label>
      <label title="Hide the chart legend">
        <input type="checkbox" id="hide-legend"> Hide legend
      </label>
      <label title="Only show race results from the last 12 months">
        <input type="checkbox" id="last-12-months"> Last 12 months
      </label>
      <label title="Only plot races in which all selected designs had at least one finisher">
        <input type="checkbox" id="common-races-only"> Common races only
      </label>
    </div>
  </div>

  <div id="chip-list" class="chip-list"></div>

  <div style="font-weight:bold;margin-bottom:0.25rem;">Back Calculated Factor Comparison <a href="ui-tips.md#chart-design-comparison" class="info-btn" data-tip="Scatter plot of back-calculated factor per race across every member boat of each selected design. Horizontal line = design RF; trend and sliding average are per design." target="_blank">ⓘ</a></div>
  <div id="comparison-chart" class="chart-tall" style="width:100%;height:960px;margin-top:0.5rem;"></div>

  <div id="pf-calc" style="display:none; margin-top:1.25rem;">
    <h3 style="margin:0 0 0.5rem;">Handicap Calculator <a href="ui-tips.md#table-pf-calc" class="info-btn" data-tip="Enter a handicap for any design — RF and Best Fit columns for all designs are scaled by the ratio. With multiple entries, the consensus ratio is used; entered values are coloured by fit quality, unentered by confidence." target="_blank">ⓘ</a></h3>
    <p style="margin:0 0 0.5rem;color:#666;font-size:0.85rem;">
      Enter a handicap for any design — all other designs are scaled by the consensus ratio.
    </p>
    <table class="pf-calc-table"></table>
  </div>

  <div id="elapsed-charts-section" style="display:none; margin-top:1.5rem;">
    <h3 style="margin:0 0 0.5rem;">Elapsed Time Comparison</h3>
    <div style="display:flex;gap:1.5rem;align-items:center;margin:0 0 0.5rem 0;font-size:0.9rem;">
      <label title="Start both axes at zero">
        <input type="checkbox" id="elapsed-from-zero" checked onchange="onElapsedFromZeroChange()"> From 0
      </label>
    </div>
    <div id="elapsed-charts-container"></div>
  </div>


  <script src="common.js"></script>
  <script src="design-comparison.js"></script>
</body>
</html>
